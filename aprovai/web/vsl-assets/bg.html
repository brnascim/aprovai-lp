<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1280px;height:720px;overflow:hidden}
  body{background:#0A0D12;font-family:Inter,sans-serif;color:#EEF1F6;position:relative}
  .glow1{position:absolute;width:780px;height:780px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,122,26,.20),transparent 62%);top:-220px;right:-200px;filter:blur(8px)}
  .glow2{position:absolute;width:620px;height:620px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,176,46,.12),transparent 60%);bottom:-240px;left:-180px}
  .grid{position:absolute;inset:0;opacity:.05;
    background-image:linear-gradient(rgba(255,255,255,.5) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.5) 1px,transparent 1px);
    background-size:48px 48px}
  .logo{position:absolute;top:54px;left:64px;display:flex;align-items:center;gap:14px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px}
  .mark{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#FF7A1A,#FFB02E);
    display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 1px rgba(255,122,26,.4),0 8px 28px rgba(255,122,26,.32)}
  .accent-i{color:#FF7A1A}
  .badge{position:absolute;top:66px;right:64px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;
    letter-spacing:.18em;text-transform:uppercase;color:#FF7A1A;display:flex;align-items:center;gap:10px}
  .dot{width:9px;height:9px;border-radius:50%;background:#FF7A1A;box-shadow:0 0 14px #FF7A1A}
  /* zona reservada para legendas (parte de baixo) — fundo só decora topo/centro */
  .center-motif{position:absolute;top:300px;left:50%;transform:translateX(-50%);width:128px;height:128px;border-radius:34px;
    background:linear-gradient(135deg,#FF7A1A,#FFB02E);display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 14px rgba(255,122,26,.10),0 0 0 28px rgba(255,122,26,.05),0 30px 80px -20px rgba(255,122,26,.5)}
  .vign{position:absolute;inset:0;box-shadow:inset 0 -180px 160px -60px #0A0D12,inset 0 0 120px -10px rgba(10,13,18,.5);pointer-events:none}
</style>
</head>
<body>
  <div class="glow1"></div><div class="glow2"></div><div class="grid"></div>
  <div class="logo"><span class="mark"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0A0D12" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>Aprova<span class="accent-i">í</span></div>
  <div class="badge"><span class="dot"></span>Motor Anti-ATS</div>
  <div class="center-motif">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#0A0D12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>
  </div>
  <div class="vign"></div>
</body>
</html>
